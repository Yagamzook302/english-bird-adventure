<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<title>English Bird Adventure</title>

<style>

body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding-top:30px;
    height:100vh;

    background:linear-gradient(
        180deg,
        #001f3f,
        #003366,
        #001122
    );

    font-family:Arial, Helvetica, sans-serif;
}

.contenedor{
    display:flex;
    gap:20px;
}

.juego{
    border:4px solid #00d9ff;

    box-shadow:
    0 0 10px #00d9ff,
    0 0 25px #00d9ff,
    0 0 50px #00d9ff;

    border-radius:15px;
    overflow:hidden;
}

.panel{
    width:280px;
    height:530px;
    overflow:hidden;
}
.panel h2{
    text-align:center;
    color:#00d9ff;
}

#listaPalabras{
    margin-top:15px;
}

.palabra{
    padding:8px;
    margin-bottom:8px;

    background:#fcfeff;

    border-radius:8px;
}

</style>
</head>

<body>

<div class="contenedor">

    <div class="juego">
        <canvas id="lienzojuego"></canvas>
    </div>

    <div class="panel">
        <h2>📚 Vocabulary</h2>

        <div id="listaPalabras">

        </div>

        <hr>

        <h3>
            Palabras aprendidas:
            <span id="contador">0</span>
        </h3>
    </div>

</div>

<script src="juego.js"></script>

</body>
</html>
