<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<title>English Bird Adventure</title>
<link rel="icon" type="image/png" href="imagenes/logo.png">

<style>

body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding-top:30px;
    height:100vh;

    background:linear-gradient(
        180deg,
        #001f3f,
        #003366,
        #001122
    );

    font-family:Arial, Helvetica, sans-serif;
}

/* --- AQUÍ ESTÁ TU LOGO CORREGIDO Y UBICADO EN SU SITIO --- */
#logo {
    position: absolute; 
    top: 20px;
    right: 20px;

    width: 60px; /* Tamaño más visible, puedes cambiarlo si lo quieres más grande o pequeño */
    height: 60px;
    object-fit: cover;

    border-radius: 50%; /* Hace que sea un círculo perfecto */
    border: 3px solid white; /* Un borde blanco elegante en lugar del de 40px */

    z-index: 999; /* Se asegura de quedar por encima de todo */

    /* Tus efectos de brillo azul */
    box-shadow:
        0 0 10px #00d9ff,
        0 0 20px #00d9ff;
}

.contenedor{
    display:flex;
    gap:20px;
}

.juego{
    border:4px solid #00d9ff;

    box-shadow:
    0 0 10px #00d9ff,
    0 0 25px #00d9ff,
    0 0 50px #00d9ff;

    border-radius:15px;
    overflow:hidden;
}

.panel{
    width:280px;
    height:530px;
    overflow:hidden;
}
.panel h2{
    text-align:center;
    color:#00d9ff;
}

#listaPalabras{
    margin-top:15px;
}

.palabra{
    padding:8px;
    margin-bottom:8px;

    background:#fcfeff;

    border-radius:8px;
}

</style>
</head>

<body>
    <img src="imagenes/logo.png" id="logo" alt="Logo">

<div class="contenedor">

    <div class="juego">
        <canvas id="lienzojuego"></canvas>
    </div>

    <div class="panel">
        <h2>📚 Vocabulary</h2>

        <div id="listaPalabras">

        </div>

        <hr>

        <h3>
            Palabras aprendidas:
            <span id="contador">0</span>
        </h3>
    </div>

</div>

<script src="juego.js"></script>

</body>
</html>
